services:
  - type: web
    name: cashmanegment-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://cashmanegment-client1.onrender.com

  - type: web
    name: cashmanegment-client1
    env: static
    rootDir: client
    buildCommand: npm install; npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://cashmanegment-api.onrender.com/api